<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 核心：移动端视口配置（解决字体错乱的关键） -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>个人项目展示</title>
    <style>
        /* 全局基础样式：响应式字体基准 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            font-size: 16px; /* 基准：1rem = 16px */
        }
        body {
            font-family: "Microsoft YaHei", Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f5f5f5;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        /* 外层容器：替代表格，居中+自适应宽度 */
        .container {
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            padding: 20px;
        }

        /* 标题样式：使用rem单位，自动适配屏幕 */
        .page-title {
            font-size: 2.375rem; /* 38px */
            text-align: center;
            margin: 20px 0;
            color: #222;
        }
        .section-title {
            font-size: 1.25rem; /* 20px */
            margin: 15px 0;
            color: #444;
            border-left: 4px solid #0066cc;
            padding-left: 10px;
        }

        /* 项目布局：flex响应式（电脑横向，手机垂直） */
        .project-item {
            display: flex;
            align-items: center;
            gap: 20px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .project-img {
            width: 30%;
            flex-shrink: 0;
        }
        .project-img img {
            width: 100%;
            height: auto;
            border-radius: 4px;
            display: block;
        }
        .project-text {
            width: 70%;
            flex: 1;
        }

        /* 移动端适配：屏幕小于768px（手机/平板）自动调整 */
        @media (max-width: 768px) {
            html {
                font-size: 14px; /* 手机端整体字体缩小 */
            }
            .project-item {
                flex-direction: column; /* 手机端垂直排列 */
                text-align: center;
            }
            .project-img,
            .project-text {
                width: 100%; /* 手机端占满宽度 */
            }
            .page-title {
                font-size: 1.8rem;
            }
        }

        /* 小屏手机适配 */
        @media (max-width: 480px) {
            html {
                font-size: 12px;
            }
            .container {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <!-- 外层自适应容器 -->
    <div class="container">
        <!-- 页面主标题 -->
        <h1 class="page-title">个人项目作品集</h1>

        <!-- 项目1 -->
        <h2 class="section-title">项目一：响应式网页开发</h2>
        <div class="project-item">
            <div class="project-img">
                <img src="项目图片1.jpg" alt="项目展示图">
            </div>
            <div class="project-text">
                <p>该项目采用HTML5+CSS3+响应式布局开发，适配电脑、手机、平板等多终端设备，解决了传统固定布局在移动端字体错乱、布局挤压的问题，提升了用户体验。</p>
            </div>
        </div>

        <!-- 项目2 -->
        <h2 class="section-title">项目二：移动端适配优化</h2>
        <div class="project-item">
            <div class="project-img">
                <img src="项目图片2.jpg" alt="项目展示图">
            </div>
            <div class="project-text">
                <p>针对移动端进行深度适配，使用rem相对单位、flex布局、viewport视口配置，实现字体、元素尺寸自动适配不同屏幕，彻底解决手机端显示混乱问题。</p>
            </div>
        </div>
    </div>
</body>
</html>
